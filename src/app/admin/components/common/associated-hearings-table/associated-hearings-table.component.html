<app-data-table caption="Hearings associated with the audio" [hiddenCaption]="true" [columns]="columns" [rows]="rows()">
  <ng-template [tableBodyTemplate] let-row>
    <tr class="govuk-table__row">
      <td class="case-id">
        <a
          class="govuk-link whitespace-pre"
          [routerLink]="['/admin/case', row.caseId]"
          [queryParams]="{ backUrl: url() }"
          >{{ row.caseNumber }}</a
        >
      </td>
      <td class="hearing-date">
        @if (row.isHearingAnonymised === true) {
          {{ row.hearingDate | luxonDate: 'dd MMM yyyy' }}
        } @else {
          <a
            class="govuk-link"
            [routerLink]="['/admin/case', row.caseId, 'hearing', row.hearingId]"
            [queryParams]="{ backUrl: url() }"
            >{{ row.hearingDate | luxonDate: 'dd MMM yyyy' }}
          </a>
        }
      </td>
      <td>{{ row.courthouse }}</td>
      <td>{{ row.courtroom }}</td>
    </tr>
    @if (row.isHearingAnonymised) {
      <tr class="expired-row govuk-table__row">
        <td colspan="4">
          <div role="region" aria-label="Case has expired">
            <svg
              class="expired-icon moj-banner__icon"
              role="presentation"
              focusable="false"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 25 25"
              height="25"
              width="25"
            >
              <path d="M13.6,15.4h-2.3v-4.5h2.3V15.4z M13.6,19.8h-2.3v-2.2h2.3V19.8z M0,23.2h25L12.5,2L0,23.2z" />
            </svg>
            <div class="moj-banner__message"><strong>Expired: </strong>This case has passed its retention date</div>
          </div>
        </td>
      </tr>
    }
  </ng-template>
</app-data-table>
